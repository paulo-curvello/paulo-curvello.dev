services:
  app:
    build: .
    container_name: portfolio-app
    restart: always
    expose:
      - "3000"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
