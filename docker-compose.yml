services:
  app:
    build: .
    container_name: portfolio-app
    restart: always
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"

      # HTTPS router — apex domain
      - "traefik.http.routers.portfolio.rule=Host(`paulocurvello.com`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls=true"
      - "traefik.http.services.portfolio.loadbalancer.server.port=3000"

      # HTTPS router — www redirect to apex
      - "traefik.http.routers.portfolio-www.rule=Host(`www.paulocurvello.com`)"
      - "traefik.http.routers.portfolio-www.entrypoints=websecure"
      - "traefik.http.routers.portfolio-www.tls=true"
      - "traefik.http.routers.portfolio-www.middlewares=www-to-apex"

      # www → apex redirect middleware
      - "traefik.http.middlewares.www-to-apex.redirectregex.regex=^https://www\\.(.*)"
      - "traefik.http.middlewares.www-to-apex.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.www-to-apex.redirectregex.permanent=true"

    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
